spring.application.name=travel-journal

# MongoDB — override via SPRING_DATA_MONGODB_URI env var when running in Docker
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/traveljournal}

# JWT — override via JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:cpsc449-travel-journal-secret-key-must-be-at-least-256-bits-long!}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=8080
